services:
  anno-server:
    image: ghcr.io/anno-universe/anno-server:latest
    container_name: anno-server
    restart: unless-stopped
    environment:
      RUN_MODE: server
      SECRET_KEY: ${SECRET_KEY:?err}
      DEBUG: "false"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_HOST: postgres
    volumes:
      - media_data:/app/media
      - /tmp/anno-thumbnails:/tmp/anno-thumbnails
    networks:
      - anno-network
    depends_on:
      postgres:
        condition: service_healthy

  anno-worker:
    image: ghcr.io/anno-universe/anno-server:latest
    scale: 2
    # Use `docker compose up -d --scale anno-worker=N` to run multiple workers.
    # Do NOT set `container_name` when scaling.
    restart: unless-stopped
    command: python manage.py db_worker
    environment:
      RUN_MODE: worker
      SECRET_KEY: ${SECRET_KEY:?err}
      DEBUG: "false"
      DATABASE_HOST: postgres
    volumes:
      - media_data:/app/media
    networks:
      - anno-network
    depends_on:
      postgres:
        condition: service_healthy

  anno-scheduler:
    image: ghcr.io/anno-universe/anno-server:latest
    container_name: anno-scheduler
    restart: unless-stopped
    command: python manage.py run_scheduler
    environment:
      RUN_MODE: scheduler
      SECRET_KEY: ${SECRET_KEY:?err}
      DEBUG: "false"
      DATABASE_HOST: postgres
      EXPORT_CLEANUP_INTERVAL_MINUTES: ${EXPORT_CLEANUP_INTERVAL_MINUTES:-10}
    volumes:
      - media_data:/app/media
    networks:
      - anno-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: anno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: anno
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - anno-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anno"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: anno-caddy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - {web-dist}:/srv/anno-web:ro
      - caddy_data:/data
    networks:
      - anno-network
    depends_on:
      - anno-server

  # Interactive inference provider (SAM/SAM2 style). Only `expose`d on the
  # internal network — the browser reaches it through Caddy's /_interactive_infer
  # route (see Caddyfile.example), never directly. In the platform's interactive
  # provider record set:
  #   inference_url = http://anno-sam:8422        (server -> service, docker DNS)
  #   public_url    = /_interactive_infer         (browser -> service, via Caddy)
  anno-sam:
    image: ghcr.io/anno-universe/sam-interactive-server:latest
    container_name: anno-sam
    restart: unless-stopped
    expose:
      - "8422"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8422"
      SAM_MODEL_ID: ${SAM_MODEL_ID:-facebook/sam-vit-base}
      PROVIDER_API_KEY: ${PROVIDER_API_KEY:-changeme}
      AUTH_HEADER: ${AUTH_HEADER:-X-API-Key}
      CORS_ORIGIN: ""
      TOKEN_HEADER: ${TOKEN_HEADER:-X-Session-Token}
      TOKEN_TTL_SECONDS: ${INTERACTIVE_SESSION_TOKEN_TTL_SECONDS:-1800}
    volumes:
      - ${HF_CACHE_DIR:-./hf-cache}:/app/.cache/huggingface
    networks:
      - anno-network
    # GPU is optional; drop the deploy block for CPU-only inference.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  anno-network:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  caddy_data:
